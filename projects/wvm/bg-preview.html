<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WVM Background Lab</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#060912; --text:#e8f0ff; --muted:#8da0c4;
    --glow:#1bd3ff; --glow-2:#7c5cff;
    --c-wvm:#7AA7E3; --c-bench:#38B6F0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:Inter,system-ui,sans-serif;
    overflow:hidden;
  }

  /* ---------- shared bg host ---------- */
  .bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0}
  #bg-canvas{position:fixed;inset:0;z-index:0;display:none}

  /* base grid (used by several variants) */
  .grid-layer{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:
      linear-gradient(color-mix(in oklab, var(--glow) 6%, transparent) 1px, transparent 1px),
      linear-gradient(90deg, color-mix(in oklab, var(--glow) 6%, transparent) 1px, transparent 1px);
    background-size:44px 44px;
    -webkit-mask-image:radial-gradient(circle at 50% 0%, #000 0%, transparent 70%);
    mask-image:radial-gradient(circle at 50% 0%, #000 0%, transparent 70%);
    opacity:.5;display:none;
  }

  /* current static baseline glows */
  .base-glow{
    position:fixed;inset:0;z-index:0;pointer-events:none;display:none;
    background:
      radial-gradient(900px 500px at 12% -8%, color-mix(in oklab, var(--glow) 16%, transparent) 0%, transparent 60%),
      radial-gradient(800px 480px at 95% 0%, color-mix(in oklab, var(--glow-2) 14%, transparent) 0%, transparent 55%),
      linear-gradient(to bottom, color-mix(in oklab, var(--glow) 4%, transparent), transparent 40%);
  }

  /* ---------- B: nebula ---------- */
  .nebula{position:fixed;inset:-20%;z-index:0;pointer-events:none;display:none;filter:blur(60px) saturate(1.2)}
  .nebula i{position:absolute;border-radius:50%;mix-blend-mode:screen;opacity:.55}
  .nebula .b1{width:55vw;height:55vw;left:-5%;top:-10%;background:radial-gradient(circle, color-mix(in oklab,var(--glow) 70%, transparent),transparent 65%);animation:drift1 26s ease-in-out infinite alternate}
  .nebula .b2{width:50vw;height:50vw;right:-8%;top:-5%;background:radial-gradient(circle, color-mix(in oklab,var(--glow-2) 70%, transparent),transparent 65%);animation:drift2 32s ease-in-out infinite alternate}
  .nebula .b3{width:46vw;height:46vw;left:30%;bottom:-25%;background:radial-gradient(circle, color-mix(in oklab,#27e0c4 60%, transparent),transparent 65%);animation:drift3 38s ease-in-out infinite alternate}
  @keyframes drift1{from{transform:translate(-4%, -2%) scale(1)}to{transform:translate(6%, 5%) scale(1.15)}}
  @keyframes drift2{from{transform:translate(3%, -3%) scale(1.1)}to{transform:translate(-5%, 6%) scale(.95)}}
  @keyframes drift3{from{transform:translate(-3%, 3%) scale(1)}to{transform:translate(4%, -4%) scale(1.2)}}

  /* twinkle stars (css) */
  .stars{position:fixed;inset:0;z-index:0;pointer-events:none;display:none}

  /* ---------- D: synthwave perspective grid ---------- */
  .synth{position:fixed;inset:0;z-index:0;pointer-events:none;display:none;overflow:hidden}
  .synth .sky{position:absolute;inset:0;background:linear-gradient(to bottom, transparent 40%, color-mix(in oklab,var(--glow-2) 18%, transparent));}
  .synth .floor{
    position:absolute;left:-50%;right:-50%;bottom:-10%;height:70%;
    background-image:
      linear-gradient(color-mix(in oklab,var(--glow) 55%, transparent) 2px, transparent 2px),
      linear-gradient(90deg, color-mix(in oklab,var(--glow) 45%, transparent) 2px, transparent 2px);
    background-size:80px 80px;
    transform:perspective(420px) rotateX(70deg);
    transform-origin:bottom center;
    -webkit-mask-image:linear-gradient(to top, #000 10%, transparent 85%);
    mask-image:linear-gradient(to top, #000 10%, transparent 85%);
    animation:floor-move 6s linear infinite;
  }
  @keyframes floor-move{from{background-position-y:0}to{background-position-y:80px}}
  .synth .sun{
    position:absolute;left:50%;top:30%;width:280px;height:280px;transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle at 50% 45%, #ff7ac6, #7c5cff 60%, transparent 72%);
    filter:blur(2px);opacity:.7;
  }

  /* ---------- overlay sample content ---------- */
  .stage{position:relative;z-index:5;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 24px}
  .stage h1{font-size:clamp(28px,4vw,52px);font-weight:800;letter-spacing:-.5px;margin:0 0 14px;text-shadow:0 2px 30px rgba(0,0,0,.6)}
  .stage h1 .accent{background:linear-gradient(90deg,var(--glow),var(--glow-2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .stage p{color:var(--muted);max-width:560px;line-height:1.6;margin:0}
  .card{margin-top:26px;padding:20px 26px;border:1px solid color-mix(in oklab,var(--glow) 25%, transparent);border-radius:16px;background:color-mix(in oklab,#0c1426 80%, transparent);backdrop-filter:blur(6px);box-shadow:0 8px 30px rgba(0,0,0,.5);max-width:420px}
  .card b{color:var(--text)} .card span{color:var(--muted);font-size:14px}

  /* ---------- switcher UI ---------- */
  .switcher{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:50;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
    padding:10px;border-radius:999px;background:rgba(8,12,22,.7);border:1px solid color-mix(in oklab,var(--glow) 20%, transparent);backdrop-filter:blur(10px);box-shadow:0 10px 40px rgba(0,0,0,.6)}
  .switcher button{
    font:600 13px/1 Inter,sans-serif;color:var(--muted);cursor:pointer;
    padding:9px 13px;border-radius:999px;border:1px solid transparent;background:transparent;transition:.18s}
  .switcher button:hover{color:var(--text);border-color:color-mix(in oklab,var(--glow) 30%, transparent)}
  .switcher button.active{color:#04121a;background:linear-gradient(90deg,var(--glow),var(--glow-2));border-color:transparent}
  .hint{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:50;font:600 12px/1 JetBrains Mono,monospace;color:var(--muted);letter-spacing:.5px;
    padding:7px 14px;border-radius:999px;background:rgba(8,12,22,.6);border:1px solid color-mix(in oklab,var(--glow) 18%, transparent)}
</style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="base-glow" data-l="glow"></div>
  <div class="nebula" data-l="nebula"><i class="b1"></i><i class="b2"></i><i class="b3"></i></div>
  <div class="stars" data-l="stars"></div>
  <div class="grid-layer" data-l="grid"></div>
  <div class="synth" data-l="synth"><div class="sky"></div><div class="sun"></div><div class="floor"></div></div>

  <div class="stage">
    <div class="hint" id="hint">current: baseline</div>
    <h1>World <span class="accent">Value</span> Models<br>for Robotic Manipulation</h1>
    <p>Hover the page for the network variants. Use the switcher below to compare each background concept on the real palette.</p>
    <div class="card"><b>Readability check</b><br><span>Make sure body text stays crisp over every background.</span></div>
  </div>

  <div class="switcher" id="switcher">
    <button data-bg="baseline">0 · Current</button>
    <button data-bg="A">A · Constellation</button>
    <button data-bg="AB">A+B · Nebula Net</button>
    <button data-bg="B">B · Nebula</button>
    <button data-bg="C">C · Value Field</button>
    <button data-bg="D">D · Synthwave</button>
  </div>

<script>
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W,H,DPR;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = canvas.width = innerWidth*DPR;
  H = canvas.height = innerHeight*DPR;
  canvas.style.width = innerWidth+'px';
  canvas.style.height = innerHeight+'px';
}
addEventListener('resize', ()=>{resize(); if(mode==='A'||mode==='AB') initParticles(); if(mode==='C') initField();});

const mouse = {x:-9999,y:-9999};
addEventListener('mousemove', e=>{mouse.x=e.clientX*DPR; mouse.y=e.clientY*DPR;});
addEventListener('mouseleave', ()=>{mouse.x=mouse.y=-9999;});

let mode='baseline', raf=null;

/* ----- A / AB: particle constellation ----- */
let parts=[];
function initParticles(){
  const count = Math.round((innerWidth*innerHeight)/14000);
  parts = Array.from({length:Math.min(count,140)}, ()=>({
    x:Math.random()*W, y:Math.random()*H,
    vx:(Math.random()-.5)*0.25*DPR, vy:(Math.random()-.5)*0.25*DPR,
    r:(Math.random()*1.6+0.6)*DPR
  }));
}
function drawConstellation(){
  ctx.clearRect(0,0,W,H);
  const linkDist = 130*DPR;
  for(const p of parts){
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>W) p.vx*=-1;
    if(p.y<0||p.y>H) p.vy*=-1;
    const dx=p.x-mouse.x, dy=p.y-mouse.y, d=Math.hypot(dx,dy);
    if(d<160*DPR){ p.x+=dx/d*0.6*DPR; p.y+=dy/d*0.6*DPR; }
  }
  for(let i=0;i<parts.length;i++){
    for(let j=i+1;j<parts.length;j++){
      const a=parts[i],b=parts[j];
      const dx=a.x-b.x, dy=a.y-b.y, d=Math.hypot(dx,dy);
      if(d<linkDist){
        const t=1-d/linkDist;
        ctx.strokeStyle=`rgba(27,211,255,${t*0.35})`;
        ctx.lineWidth=DPR*0.6;
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
      }
    }
  }
  for(const p of parts){
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);
    ctx.fillStyle='rgba(125,240,255,.9)';
    ctx.shadowColor='rgba(27,211,255,.9)';ctx.shadowBlur=8*DPR;
    ctx.fill();ctx.shadowBlur=0;
  }
  raf=requestAnimationFrame(drawConstellation);
}

/* ----- C: value flow field ----- */
let field=[];
function initField(){
  field=[];
  const n=Math.min(Math.round((innerWidth*innerHeight)/9000),160);
  for(let i=0;i<n;i++) field.push({x:Math.random()*W,y:Math.random()*H,px:0,py:0,life:Math.random()*200});
}
let tF=0;
function flowAngle(x,y){
  return (Math.sin(x*0.0016+tF*0.0006)+Math.cos(y*0.0018-tF*0.0005))*Math.PI;
}
function drawField(){
  tF++;
  ctx.fillStyle='rgba(6,9,18,0.07)';
  ctx.fillRect(0,0,W,H);
  for(const p of field){
    p.px=p.x; p.py=p.y;
    const a=flowAngle(p.x,p.y);
    p.x+=Math.cos(a)*1.1*DPR; p.y+=Math.sin(a)*1.1*DPR;
    p.life--;
    if(p.life<0||p.x<0||p.x>W||p.y<0||p.y>H){p.x=Math.random()*W;p.y=Math.random()*H;p.px=p.x;p.py=p.y;p.life=Math.random()*200+60;}
    const hue = 190 + 60*Math.sin((p.x+p.y)*0.001);
    ctx.strokeStyle=`hsla(${hue},90%,65%,0.5)`;
    ctx.lineWidth=DPR*0.9;
    ctx.beginPath();ctx.moveTo(p.px,p.py);ctx.lineTo(p.x,p.y);ctx.stroke();
  }
  raf=requestAnimationFrame(drawField);
}

/* ----- stars (css dom dots) ----- */
const starHost=document.querySelector('.stars');
function buildStars(){
  if(starHost.childElementCount) return;
  let html='';
  for(let i=0;i<90;i++){
    const s=Math.random()*2+1, x=Math.random()*100, y=Math.random()*100, d=(Math.random()*4+2).toFixed(1), de=(Math.random()*4).toFixed(1);
    html+=`<i style="position:absolute;left:${x}%;top:${y}%;width:${s}px;height:${s}px;border-radius:50%;background:#cfe8ff;box-shadow:0 0 6px #7df0ff;animation:tw ${d}s ease-in-out ${de}s infinite"></i>`;
  }
  starHost.innerHTML=html;
  const st=document.createElement('style');
  st.textContent='@keyframes tw{0%,100%{opacity:.15;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}';
  document.head.appendChild(st);
}

function showLayers(list){
  document.querySelectorAll('[data-l]').forEach(el=>el.style.display='none');
  canvas.style.display='none';
  list.forEach(name=>{
    if(name==='canvas'){canvas.style.display='block';return;}
    const el=document.querySelector(`[data-l="${name}"]`);
    if(el) el.style.display='block';
  });
}

function setMode(m){
  mode=m;
  if(raf){cancelAnimationFrame(raf);raf=null;}
  resize();
  document.getElementById('hint').textContent='current: '+
    ({baseline:'0 baseline (current site)',A:'A constellation',AB:'A+B nebula network',B:'B nebula',C:'C value field',D:'D synthwave'})[m];
  document.querySelectorAll('.switcher button').forEach(b=>b.classList.toggle('active',b.dataset.bg===m));
  document.body.style.background='var(--bg)';

  if(m==='baseline'){ showLayers(['glow','grid']); }
  else if(m==='A'){ buildStars(); showLayers(['glow','canvas']); initParticles(); drawConstellation(); }
  else if(m==='AB'){ buildStars(); showLayers(['nebula','stars','canvas']); initParticles(); drawConstellation(); }
  else if(m==='B'){ buildStars(); showLayers(['nebula','stars','grid']); }
  else if(m==='C'){ showLayers(['glow','canvas']); ctx.clearRect(0,0,W,H); initField(); drawField(); }
  else if(m==='D'){ buildStars(); showLayers(['stars','synth']); }
}

document.getElementById('switcher').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return; setMode(b.dataset.bg);
});

resize();
setMode('AB');
</script>
</body>
</html>
